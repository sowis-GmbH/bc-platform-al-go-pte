name: 'Sowis Functional Test Build'

on:
  workflow_dispatch:
    inputs:
      testIssueNumber:
        description: 'Test issue number'
        required: true
        type: string

      requestCommentId:
        description: 'Request comment ID'
        required: true
        type: string

      statusCommentId:
        description: 'Status comment ID'
        required: true
        type: string

      requestedByLogin:
        description: 'Requesting GitHub user'
        required: true
        type: string

      correlationId:
        description: 'Unique build correlation ID'
        required: true
        type: string

      baseBranch:
        description: 'Base branch'
        required: true
        type: string

      developmentsJson:
        description: 'Resolved development branches'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-functional-test-branch:
    name: Prepare functional test branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.baseBranch }}
          fetch-depth: 0

      - name: Configure Git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate request
        shell: bash
        env:
          DEVELOPMENTS_JSON: ${{ inputs.developmentsJson }}
        run: |
          set -euo pipefail

          if [ -z "${{ inputs.testIssueNumber }}" ]; then
            echo "testIssueNumber is missing."
            exit 1
          fi

          if [ -z "${{ inputs.correlationId }}" ]; then
            echo "correlationId is missing."
            exit 1
          fi

          echo "$DEVELOPMENTS_JSON" | jq empty

          DEVELOPMENT_COUNT="$(echo "$DEVELOPMENTS_JSON" | jq 'length')"

          if [ "$DEVELOPMENT_COUNT" -eq 0 ]; then
            echo "No development branches were supplied."
            exit 1
          fi

          echo "Request is valid."
          echo "Development count: $DEVELOPMENT_COUNT"

      - name: Create temporary branch
        id: branch
        shell: bash
        run: |
          set -euo pipefail

          SHORT_CORRELATION_ID="$(echo "${{ inputs.correlationId }}" | cut -c1-8)"
          TEMP_BRANCH="functional-test/${{ inputs.testIssueNumber }}-${SHORT_CORRELATION_ID}"

          echo "Creating temporary branch: $TEMP_BRANCH"

          git switch --create "$TEMP_BRANCH"

          echo "name=$TEMP_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Merge development branches
        shell: bash
        env:
          DEVELOPMENTS_JSON: ${{ inputs.developmentsJson }}
        run: |
          set -euo pipefail

          echo "$DEVELOPMENTS_JSON" |
            jq -r '.[].branchName' |
            while IFS= read -r DEVELOPMENT_BRANCH; do
              if [ -z "$DEVELOPMENT_BRANCH" ]; then
                continue
              fi

              echo "Fetching branch: $DEVELOPMENT_BRANCH"

              git fetch origin \
                "$DEVELOPMENT_BRANCH:refs/remotes/origin/$DEVELOPMENT_BRANCH"

              echo "Merging branch: $DEVELOPMENT_BRANCH"

              git merge \
                --no-ff \
                --no-edit \
                "origin/$DEVELOPMENT_BRANCH"
            done

      - name: Write functional test metadata
        shell: pwsh
        run: |
          $metadataDirectory = ".functional-test"
          $metadataFile = Join-Path $metadataDirectory "request.json"

          New-Item `
            -ItemType Directory `
            -Path $metadataDirectory `
            -Force | Out-Null

          $metadata = @{
            testIssueNumber = [int]"${{ inputs.testIssueNumber }}"
            requestCommentId = "${{ inputs.requestCommentId }}"
            statusCommentId = "${{ inputs.statusCommentId }}"
            requestedByLogin = "${{ inputs.requestedByLogin }}"
            correlationId = "${{ inputs.correlationId }}"
            baseBranch = "${{ inputs.baseBranch }}"
            temporaryBranch = "${{ steps.branch.outputs.name }}"
            projectRepository = "sowis-GmbH/bc-platform-project-management"
          }

          $metadata |
            ConvertTo-Json -Depth 20 |
            Set-Content `
              -Path $metadataFile `
              -Encoding UTF8

          git add $metadataFile

          if (-not (git diff --cached --quiet)) {
              git commit -m "Add functional test build metadata"
          }
          else {
              Write-Host "No metadata changes to commit."
          }

      - name: Push temporary branch
        shell: bash
        run: |
          set -euo pipefail

          git push \
            --set-upstream \
            origin \
            "${{ steps.branch.outputs.name }}"

      - name: Trigger AL-Go CI/CD
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GHTOKENWORKFLOW }}
          script: |
            const branchName = '${{ steps.branch.outputs.name }}';

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'CICD.yaml',
              ref: branchName
            });

            core.info(
              `AL-Go CI/CD was triggered for branch ${branchName}.`
            );

      - name: Display result
        shell: bash
        run: |
          echo "Functional test branch created successfully."
          echo "Repository: ${{ github.repository }}"
          echo "Base branch: ${{ inputs.baseBranch }}"
          echo "Temporary branch: ${{ steps.branch.outputs.name }}"
          echo "Test issue: #${{ inputs.testIssueNumber }}"
          echo "Correlation ID: ${{ inputs.correlationId }}"